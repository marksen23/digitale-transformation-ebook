name: Daily History Snapshot

# Generiert täglich um 03:00 UTC einen aggregierten Snapshot des
# Resonanz-Korpus, baut Tages-Manifests und appended ans Quartals-Ledger.
# Manuell triggerbar via "Run workflow"-Button in GitHub Actions.

on:
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC
  workflow_dispatch:       # manueller Trigger

permissions:
  contents: write           # Push der Snapshot-Files

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Auf demselben Branch committen, von dem der Workflow lief
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run snapshot script
        run: pnpm tsx scripts/snapshot-history.ts

      - name: Commit & push if changed
        run: |
          git config user.name  "history-snapshot-bot"
          git config user.email "history-snapshot-bot@users.noreply.github.com"
          git add content/history/
          if git diff --cached --quiet; then
            echo "Keine Änderungen — kein Commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "history: daily snapshot $DATE [bot]"
          git push
