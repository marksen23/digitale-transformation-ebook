name: Daily History Snapshot

# Generiert täglich um 03:00 UTC einen aggregierten Snapshot des
# Resonanz-Korpus, baut Tages-Manifests und appended ans Quartals-Ledger.
# Manuell triggerbar via "Run workflow"-Button in GitHub Actions.

on:
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC
  workflow_dispatch:       # manueller Trigger

permissions:
  contents: write           # Push der Snapshot-Files

# JavaScript-Actions explizit auf Node 24 zwingen
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Action-SHAs gepinnt (Repo-Policy: keine Tag-Refs erlaubt)
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
          # Auf demselben Branch committen, von dem der Workflow lief
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run snapshot script
        run: pnpm tsx scripts/snapshot-history.ts

      - name: Commit & push if changed
        run: |
          git config user.name  "history-snapshot-bot"
          git config user.email "history-snapshot-bot@users.noreply.github.com"
          git add content/history/
          if git diff --cached --quiet; then
            echo "Keine Änderungen — kein Commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "history: daily snapshot $DATE [bot]"
          git push
