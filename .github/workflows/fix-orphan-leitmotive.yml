name: Fix Orphan Leitmotiv-IDs

# Manuell triggerbar: repariert Resonanz-Files, deren nodeIds noch das
# alte unprefixierte Format ("begegnung") statt des korrekten lm-Prefix
# ("lm-begegnung") nutzen. Mappt automatisch alle 5 Leitmotiv-Knoten.
#
# Nutzt GITHUB_TOKEN der Action (contents:write), kein eigener PAT nötig.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run (nur Anzeige, keine Änderungen)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fix orphans
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm tsx scripts/fix-orphan-leitmotive.ts --dry-run
          else
            pnpm tsx scripts/fix-orphan-leitmotive.ts
          fi
