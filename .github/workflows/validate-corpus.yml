name: Validate Resonanz-Korpus

# Triggert bei jedem Commit auf main, der content/resonanzen/** ändert.
# Läuft den Konsistenz-Wächter (scripts/validate-resonanzen.ts) und öffnet
# bei Schema-Verletzungen automatisch ein GitHub-Issue.
#
# Wozu das gut ist:
#   - Frühe Drift-Erkennung: ein Tippfehler im nodeId, ein gebrochener
#     content_hash, ein illegaler endpoint-Wert → sofort sichtbar
#   - Keine stille Korruption: das System verlässt nicht unbemerkt den Pfad
#   - Manuelle Intervention statt heimlicher Fortschritt

on:
  push:
    branches: [main]
    paths:
      - "content/resonanzen/**"
      - "scripts/validate-resonanzen.ts"
      - "scripts/build-resonanzen-index.ts"
      - "scripts/build-search-index.ts"
      - "scripts/check-corpus-drift.ts"
      - "client/src/data/conceptGraph.ts"
      - "client/src/data/philosophyMap.ts"
  workflow_dispatch:  # manuell triggerbar zum Auf-Verlangen-Check

# Serialisierung: nur EIN Korpus-Rebuild gleichzeitig. Ursache der
# wiederkehrenden Push-Failures (CLAUDE.md Fallstrick #3): zwei Live-Append-
# Commits Sekunden auseinander triggerten zwei parallele Full-Rebuilds, die
# beim Commit-Back um main rennen → Merge-Konflikte in ALLEN generierten
# Artefakten (resonanzen-index.json, embeddings, corpus-map, Tages-Snapshot)
# → der Rebase bleibt mit unmerged files stecken, alle Retries scheitern an
# „Pulling is not possible". cancel-in-progress:false = der zweite Lauf wird
# NICHT abgebrochen, sondern reiht sich ein und läuft gegen das bereits
# aktualisierte main (rebuildet ohnehin den ganzen Korpus-Tree) — kein
# Datenverlust, kein Konflikt. Strikt sicherer als paralleles Pushen.
concurrency:
  group: corpus-rebuild-main
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # für Snapshot-Commit + Tag-Push
      issues: write    # für Issue-Erstellung bei Failures
      pull-requests: write  # für künftige Auto-Revert-PRs (Säule 3 Stufe 3c)
    steps:
      # Action-SHAs gepinnt (Repo-Policy: keine Tag-Refs erlaubt).
      # Kommentare nennen die ursprüngliche Tag-Version für Lesbarkeit.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        # Version aus package.json packageManager-Feld

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run validation
        id: validate
        run: |
          set +e
          pnpm tsx scripts/validate-resonanzen.ts > validation-output.txt 2>&1
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          echo "=== validation output ==="
          cat validation-output.txt
          if [ -f client/public/resonanzen-validation-report.json ]; then
            echo "report_path=client/public/resonanzen-validation-report.json" >> $GITHUB_OUTPUT
          fi
          exit $EXIT

      - name: Open issue on validation failure
        if: failure() && steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            const fs = require('fs');
            let report = null;
            try {
              report = JSON.parse(fs.readFileSync('client/public/resonanzen-validation-report.json', 'utf-8'));
            } catch (e) {
              core.warning('Report could not be read: ' + e.message);
            }
            const errors = (report?.issues || []).filter(i => i.level === 'error');
            const warnings = (report?.issues || []).filter(i => i.level === 'warning');
            const errLines = errors.slice(0, 30).map(i => `- **[${i.rule}]** \`${i.file}\`: ${i.detail}`).join('\n');
            const warnLines = warnings.slice(0, 10).map(i => `- [${i.rule}] \`${i.file}\`: ${i.detail}`).join('\n');
            const sha = context.sha.slice(0, 7);
            const body = [
              `**Konsistenz-Wächter hat ${errors.length} Fehler im Resonanz-Korpus festgestellt.**`,
              ``,
              `Triggered by commit ${sha} auf \`${context.ref}\`.`,
              `Geprüft: ${report?.filesChecked ?? 0} Files`,
              ``,
              `### Fehler`,
              errLines || '_keine_',
              warnings.length > 0 ? `\n### Warnings (${warnings.length})\n${warnLines}` : '',
              ``,
              `---`,
              ``,
              `**Was tun:**`,
              `1. Inkriminierte Datei(en) prüfen — ist der Eintrag korrekt geschrieben worden?`,
              `2. Bei Bedarf Frontmatter korrigieren oder den Eintrag entfernen`,
              `3. Nach Fix: Action wird beim nächsten Push automatisch neu validieren`,
              `4. Falls dies ein bekanntes Schema-Issue ist, kann der Validator (\`scripts/validate-resonanzen.ts\`) angepasst werden`,
              ``,
              `<details><summary>Voller Run-Output</summary>`,
              ``,
              '```',
              fs.existsSync('validation-output.txt') ? fs.readFileSync('validation-output.txt', 'utf-8').slice(0, 4000) : '_no output_',
              '```',
              ``,
              `</details>`,
            ].join('\n');

            // Suche nach offenem Issue mit selbem Label, vermeide Duplikate
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'corpus-validation',
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Erneuter Fail bei commit ${sha}:\n\n${body}`,
              });
              core.info(`Updated existing issue #${existing[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Korpus-Validierung] ${errors.length} Fehler bei commit ${sha}`,
                body,
                labels: ['corpus-validation', 'bug'],
              });
              core.info(`Created issue #${created.number}`);
            }

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: validation-report
          path: client/public/resonanzen-validation-report.json
          retention-days: 30
          if-no-files-found: ignore

      # ─── Säule 3: Versionssicherung ────────────────────────────────────
      # Bei erfolgreicher Validation:
      #   - Snapshot der Aggregat-Statistik archivieren (versions/)
      #   - last-stable-{datum} Tag setzen (überschreibt täglichen Tag)
      # Snapshots dienen Säule 3 als Anker für Drift-Detection.
      - name: Build snapshot of corpus state
        if: success()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p versions
          # Snapshot: aktuelle Aggregate aus dem Validation-Report
          if [ -f client/public/resonanzen-validation-report.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('client/public/resonanzen-validation-report.json', 'utf-8'));
              const snap = {
                date: '$DATE',
                generatedAt: new Date().toISOString(),
                commit: '${{ github.sha }}',
                filesChecked: r.filesChecked,
                aggregates: r.aggregates,
                errors: r.errors,
                warnings: r.warnings,
              };
              fs.writeFileSync('versions/snapshot-$DATE.json', JSON.stringify(snap, null, 2));
              console.log('Snapshot:', snap);
            "
          fi

      # ─── Index-Rebuild: das eigentliche Inkrafttreten ──────────────────
      # Sobald validate erfolgreich war, generieren wir client/public/
      # resonanzen-index.json neu — sonst landen frische AI-Antworten zwar
      # als Markdown in raw/, aber die FAQ-Ansicht sieht sie erst beim
      # nächsten manuellen Build. Mit diesem Schritt schließt sich der
      # Loop: API-PUT → validate → rebuild-index → commit → static deploy.
      #
      # Embeddings werden nur generiert, wenn GEMINI_API_KEY als Secret
      # vorliegt; ohne fällt der Index auf Lexical-Search zurück (ohne
      # related-Cross-Links, aber funktional vollständig).
      # Werk-Text-Chunks (Tier-1-3-Roadmap, Feature D — RAG-Foundation):
      # paragraph-level Embeddings des Buchtexts, retrievable im Server
      # über server/lib/werkRetrieval.ts. Inkrementell — nur neue Chunks
      # bekommen API-Calls.
      - name: Rebuild werk-chunks.json (RAG-Index)
        if: success()
        run: pnpm tsx scripts/build-werk-chunks.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Multi-Key-Failover (M5): zweiter Key auf anderem GCP-Projekt mit
          # eigenem Billing. Vektorkompatibel (selbes Modell). Leer = ignoriert.
          GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          GEMINI_EMBED_MODEL: gemini-embedding-001

      - name: Rebuild Search-Index (concepts + philosophers Embeddings)
        if: success()
        run: pnpm tsx scripts/build-search-index.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          GEMINI_EMBED_MODEL: gemini-embedding-001

      - name: Rebuild resonanzen-index.json
        if: success()
        run: pnpm tsx scripts/build-resonanzen-index.ts && pnpm tsx scripts/build-corpus-timeline.ts && pnpm tsx scripts/build-werk-pdf.ts
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME:  ${{ github.event.repository.name }}
          GITHUB_REPO_BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          # Embeddings sind im CI Pflicht — wenn 0 Calls erfolgreich, Build
          # rot färben (sonst sah man bisher grünen Haken bei leerem Index).
          # Netlify-Builds setzen das Flag NICHT → dort soft-fail.
          EMBEDDINGS_REQUIRED: "1"

      # M4: Wenn ein Embedding-Build-Step fehlschlug, eine prominente
      # ::error::-Annotation mit der wahrscheinlichen Ursache + Remedy
      # ausgeben. Macht den Billing-Block in der CI-UI sofort lesbar, statt
      # ihn nur in den Logs zu verstecken.
      - name: Annotate embedding failure
        if: failure()
        run: |
          echo "::error title=Embedding-Pipeline fehlgeschlagen::Wahrscheinliche Ursache: GCP-Projekt-Billing gesperrt (403 dunning / PERMISSION_DENIED) oder ungültiger Key. Remedy: GEMINI_API_KEY_FALLBACK als Repo-Secret auf einem zahlungsfähigen GCP-Projekt setzen (selbes Modell → vektorkompatibel), oder Billing des Primärprojekts begleichen. Live-Status: /admin/health → Embedding-Pipeline."

      # Embeddings/Index als Artifact uploaden — auch wenn der Commit-Step
      # später fehlschlägt. So lässt sich der lokal generierte State
      # vom Runner herunterladen und inspizieren, statt nur Logs zu raten.
      - name: Upload rebuilt index + embeddings as artifact
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: corpus-state
          path: |
            client/public/resonanzen-index.json
            client/public/resonanzen-embeddings.json
            client/public/resonanzen-holdout-baseline.json
            client/public/resonanzen-holdout-report.json
            client/public/resonanzen-node-density.json
            client/public/resonanzen-link-predictions.json
            client/public/resonanzen-anchor-clusters.json
            client/public/resonanzen-corpus-map.json
            client/public/werk-chunks.json
            client/public/resonanzen-timeline.json
            client/public/concepts-embeddings.json
            client/public/philosophers-embeddings.json
            client/public/exports/resonanzvernunft.pdf
          retention-days: 7
          if-no-files-found: warn

      - name: Commit snapshot + index + tag last-stable
        if: success()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "corpus-guardian-bot"
          git config user.email "noreply@github.com"
          # Snapshot + neu gebauten Index gemeinsam stagen.
          # -f weil die Index-Files im Repo via .gitignore vom Commit
          # ausgeschlossen sind (Dev-Artefakte). In CI heben wir das auf,
          # damit Netlify auch ohne eigenes Rebuild den frischen Index hat.
          git add versions/
          # Diagnose: zeige welche Dateien existieren, bevor wir sie adden.
          # Vorher wurde 2>/dev/null || true verwendet, das jeden "file
          # nicht gefunden"-Fehler still schluckte — Resultat: workflow
          # "green" trotz fehlender Embeddings-File auf der Remote.
          echo "=== Files vor git add: ==="
          ls -la client/public/resonanzen-*.json 2>&1 || echo "(keine resonanzen-*.json Files)"
          # Jeden File einzeln adden mit klarem Logging.
          # WICHTIG: alle vom Build geschriebenen Files MÜSSEN hier rein,
          # sonst stranded git pull --rebase mit "You have unstaged changes"
          # und der Push schlägt fehl (passiert: 2026-05-23 Run 70436097442).
          for f in \
              client/public/resonanzen-index.json \
              client/public/resonanzen-embeddings.json \
              client/public/resonanzen-holdout-baseline.json \
              client/public/resonanzen-holdout-report.json \
              client/public/resonanzen-drift-report.json \
              client/public/resonanzen-validation-report.json \
              client/public/resonanzen-chapter-hashes.json \
              client/public/resonanzen-node-density.json \
              client/public/resonanzen-link-predictions.json \
              client/public/resonanzen-anchor-clusters.json \
              client/public/resonanzen-corpus-map.json \
              client/public/werk-chunks.json \
              client/public/resonanzen-timeline.json \
              client/public/concepts-embeddings.json \
              client/public/philosophers-embeddings.json \
              client/public/exports/resonanzvernunft.pdf; do
            if [ -f "$f" ]; then
              git add -f "$f" && echo "[git add] OK: $f"
            else
              echo "[git add] SKIP (not found): $f"
            fi
          done
          # Defensiv (Wurzelursache-Fix): ALLE resonanzen-*-Artefakte erfassen —
          # auch neu hinzugekommene (questions, question-embeddings,
          # concept-candidates …), damit kein Build-Artefakt still uncommitted
          # bleibt (passiert 2026-06-22: resonanzen-questions.json blieb Seed).
          git add -f client/public/resonanzen-*.json 2>/dev/null && echo "[git add] glob resonanzen-*.json OK" || true
          # validation-output.txt ist nur Temp-Log von Step 6, gehört nicht
          # ins Repo — explizit entfernen, damit pull --rebase nicht stolpert.
          rm -f validation-output.txt
          echo "=== Staged diff (numstat): ==="
          git diff --cached --numstat | head -10 || true
          echo "=== git status: ==="
          git status --short
          echo "=== git remote: ==="
          git remote -v
          if git diff --cached --quiet; then
            echo "No snapshot/index changes to commit"
          else
            # WICHTIG: kein [skip ci] mehr!
            # Race: Netlify batched mehrere Pushes und nutzt das HEAD-Commit-
            # Message für die [skip ci]-Prüfung. Wenn AI-Log-Push und unser
            # Snapshot-Push schnell aufeinander folgen, war HEAD = snapshot
            # mit [skip ci] → Netlify skipped beide. Resultat: kein Deploy
            # seit dem 11.5. trotz täglich neuer KI-Antworten.
            #
            # Der Commit hier ändert nur versions/ + client/public/resonanzen-*.json
            # — keine dieser Pfade matcht das paths:-Filter des Workflows
            # (content/resonanzen/**), also kein Infinite-Loop trotz fehlendem
            # [skip ci].
            git commit -m "snapshot: corpus state + index $DATE"
            # Race-Schutz: wenn main inzwischen gewachsen ist, rebase
            # vor dem Push, damit der Snapshot nicht in einer Push-Race
            # verloren geht.
            PUSH_OK=false
            for i in 1 2 3; do
              echo "--- Push attempt $i ---"
              # Falls ein vorheriger Versuch mitten im Rebase mit unmerged
              # files stecken blieb: abbrechen, sonst scheitert jeder weitere
              # `git pull --rebase` sofort an „Pulling is not possible because
              # you have unmerged files" und die Retries kaskadieren ins Leere.
              git rebase --abort 2>/dev/null || true
              # --autostash: falls trotz aller Vorsicht noch ein File dirty
            # liegt (z.B. Drift-Check schreibt drift-report.json nach dem
            # Stage-Loop), wird es vor dem Rebase auto-gestashed und danach
            # wieder appliziert. Belt-and-Suspenders.
            if git pull --rebase --autostash origin main && git push origin main; then
                PUSH_OK=true
                echo "[push] SUCCESS on attempt $i"
                break
              fi
              echo "[push] FAILED on attempt $i — retrying in $((2 * i))s"
              sleep $((2 * i))
            done
            # Wenn alle 3 Push-Versuche scheitern, Workflow rot färben.
            # Vorher: Loop endete still, Workflow blieb grün, der User
            # merkte nie dass nichts auf main ankam.
            if [ "$PUSH_OK" != "true" ]; then
              echo "::error::Snapshot+Index konnte nicht nach main gepusht werden (3 Versuche fehlgeschlagen)."
              echo "Mögliche Ursachen: Branch-Protection, fehlende contents:write-Permission,"
              echo "oder Race mit nebenläufigem Bot-Push."
              exit 1
            fi
          fi
          # Tag last-stable überschreiben (force, damit immer auf neuestem stable steht)
          git tag -f last-stable-$DATE
          git tag -f last-stable
          git push origin --tags --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Build-Hook-Trigger (Belt-and-Suspenders) ──────────────────────
      # Falls Netlify/Render-Auto-Deploy kaputt ist (sei es durch [skip ci]-
      # Races, deaktivierte Hooks, oder Webhook-Drift), triggern wir den
      # Build hier explizit. Beide Hooks sind optional: ohne gesetztes
      # Secret wird der Schritt geräuschlos übersprungen.
      #
      # Setup:
      #   Netlify  → Site settings → Build hooks → New build hook → URL
      #               als GitHub Secret NETLIFY_BUILD_HOOK_URL speichern
      #   Render   → Service → Settings → Deploy hook URL
      #               als GitHub Secret RENDER_DEPLOY_HOOK_URL speichern
      - name: Trigger Netlify build hook
        if: success() && env.NETLIFY_HOOK != ''
        env:
          NETLIFY_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          echo "Triggering Netlify build hook …"
          curl -fsS -X POST -d {} "$NETLIFY_HOOK" && echo "✓ Netlify build queued"

      - name: Trigger Render deploy hook
        if: success() && env.RENDER_HOOK != ''
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy hook …"
          curl -fsS -X POST "$RENDER_HOOK" && echo "✓ Render deploy queued"

      # ─── Drift-Detection: vergleicht aktuellen mit vorigem Snapshot ────
      # Bei Alarmen → Issue mit Label 'corpus-drift'.
      - name: Run drift check
        if: success()
        id: drift
        run: |
          set +e
          pnpm tsx scripts/check-corpus-drift.ts > drift-output.txt 2>&1
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          cat drift-output.txt
          exit 0  # niemals fail — Drift ist Warning, kein Action-Fail

      - name: Open issue on drift alarm
        if: success() && steps.drift.outputs.exit_code == '1'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            const fs = require('fs');
            let report = null;
            try {
              report = JSON.parse(fs.readFileSync('client/public/resonanzen-drift-report.json', 'utf-8'));
            } catch (e) {
              core.warning('Drift-Report could not be read: ' + e.message);
              return;
            }
            const alarms = (report.issues || []).filter(i => i.level === 'alarm');
            const warnings = (report.issues || []).filter(i => i.level === 'warning');
            if (alarms.length === 0 && warnings.length === 0) return;
            const sha = context.sha.slice(0, 7);
            const lines = [
              `**Drift-Detection: Korpus-Stand hat sich seit letzter Snapshot bedenklich verändert.**`,
              ``,
              `Commit: ${sha} · Vorherige Snapshot: ${report.previousSnapshot.date} (${report.previousSnapshot.commit?.slice(0,7)}) · Aktuell: ${report.currentSnapshot.date}`,
              `Delta: ${report.delta.files >= 0 ? '+' : ''}${report.delta.files} Files`,
              ``,
              `### Alarme (${alarms.length})`,
              alarms.length > 0
                ? alarms.map(i => `- 🚨 **[${i.rule}]** ${i.detail}`).join('\n')
                : '_keine_',
              ``,
              `### Warnings (${warnings.length})`,
              warnings.length > 0
                ? warnings.map(i => `- ⚠ [${i.rule}] ${i.detail}`).join('\n')
                : '_keine_',
              ``,
              `---`,
              `**Was tun:**`,
              `1. Prüfen ob die Veränderung beabsichtigt war (z.B. bewusstes Löschen alter Einträge)`,
              `2. Bei unbeabsichtigtem Drift: \`git checkout last-stable -- content/resonanzen/\` und committen`,
              `3. Schwellwerte des Drift-Detectors (\`scripts/check-corpus-drift.ts\`) sind anpassbar`,
            ].join('\n');

            // Dedup: bestehendes drift-Issue → Comment, sonst neues Issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'corpus-drift',
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Erneuter Drift bei ${sha}:\n\n${lines}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Korpus-Drift] ${alarms.length} Alarm(e) bei commit ${sha}`,
                body: lines,
                labels: ['corpus-drift'],
              });
            }
