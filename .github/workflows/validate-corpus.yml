name: Validate Resonanz-Korpus

# Triggert bei jedem Commit auf main, der content/resonanzen/** ändert.
# Läuft den Konsistenz-Wächter (scripts/validate-resonanzen.ts) und öffnet
# bei Schema-Verletzungen automatisch ein GitHub-Issue.
#
# Wozu das gut ist:
#   - Frühe Drift-Erkennung: ein Tippfehler im nodeId, ein gebrochener
#     content_hash, ein illegaler endpoint-Wert → sofort sichtbar
#   - Keine stille Korruption: das System verlässt nicht unbemerkt den Pfad
#   - Manuelle Intervention statt heimlicher Fortschritt

on:
  push:
    branches: [main]
    paths:
      - "content/resonanzen/**"
      - "scripts/validate-resonanzen.ts"
      - "client/src/data/conceptGraph.ts"
  workflow_dispatch:  # manuell triggerbar zum Auf-Verlangen-Check

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # für Snapshot-Commit + Tag-Push
      issues: write    # für Issue-Erstellung bei Failures
      pull-requests: write  # für künftige Auto-Revert-PRs (Säule 3 Stufe 3c)
    steps:
      # Action-SHAs gepinnt (Repo-Policy: keine Tag-Refs erlaubt).
      # Kommentare nennen die ursprüngliche Tag-Version für Lesbarkeit.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        # Version aus package.json packageManager-Feld

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run validation
        id: validate
        run: |
          set +e
          pnpm tsx scripts/validate-resonanzen.ts > validation-output.txt 2>&1
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          echo "=== validation output ==="
          cat validation-output.txt
          if [ -f client/public/resonanzen-validation-report.json ]; then
            echo "report_path=client/public/resonanzen-validation-report.json" >> $GITHUB_OUTPUT
          fi
          exit $EXIT

      - name: Open issue on validation failure
        if: failure() && steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            const fs = require('fs');
            let report = null;
            try {
              report = JSON.parse(fs.readFileSync('client/public/resonanzen-validation-report.json', 'utf-8'));
            } catch (e) {
              core.warning('Report could not be read: ' + e.message);
            }
            const errors = (report?.issues || []).filter(i => i.level === 'error');
            const warnings = (report?.issues || []).filter(i => i.level === 'warning');
            const errLines = errors.slice(0, 30).map(i => `- **[${i.rule}]** \`${i.file}\`: ${i.detail}`).join('\n');
            const warnLines = warnings.slice(0, 10).map(i => `- [${i.rule}] \`${i.file}\`: ${i.detail}`).join('\n');
            const sha = context.sha.slice(0, 7);
            const body = [
              `**Konsistenz-Wächter hat ${errors.length} Fehler im Resonanz-Korpus festgestellt.**`,
              ``,
              `Triggered by commit ${sha} auf \`${context.ref}\`.`,
              `Geprüft: ${report?.filesChecked ?? 0} Files`,
              ``,
              `### Fehler`,
              errLines || '_keine_',
              warnings.length > 0 ? `\n### Warnings (${warnings.length})\n${warnLines}` : '',
              ``,
              `---`,
              ``,
              `**Was tun:**`,
              `1. Inkriminierte Datei(en) prüfen — ist der Eintrag korrekt geschrieben worden?`,
              `2. Bei Bedarf Frontmatter korrigieren oder den Eintrag entfernen`,
              `3. Nach Fix: Action wird beim nächsten Push automatisch neu validieren`,
              `4. Falls dies ein bekanntes Schema-Issue ist, kann der Validator (\`scripts/validate-resonanzen.ts\`) angepasst werden`,
              ``,
              `<details><summary>Voller Run-Output</summary>`,
              ``,
              '```',
              fs.existsSync('validation-output.txt') ? fs.readFileSync('validation-output.txt', 'utf-8').slice(0, 4000) : '_no output_',
              '```',
              ``,
              `</details>`,
            ].join('\n');

            // Suche nach offenem Issue mit selbem Label, vermeide Duplikate
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'corpus-validation',
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Erneuter Fail bei commit ${sha}:\n\n${body}`,
              });
              core.info(`Updated existing issue #${existing[0].number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Korpus-Validierung] ${errors.length} Fehler bei commit ${sha}`,
                body,
                labels: ['corpus-validation', 'bug'],
              });
              core.info(`Created issue #${created.number}`);
            }

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: validation-report
          path: client/public/resonanzen-validation-report.json
          retention-days: 30
          if-no-files-found: ignore

      # ─── Säule 3: Versionssicherung ────────────────────────────────────
      # Bei erfolgreicher Validation:
      #   - Snapshot der Aggregat-Statistik archivieren (versions/)
      #   - last-stable-{datum} Tag setzen (überschreibt täglichen Tag)
      # Snapshots dienen Säule 3 als Anker für Drift-Detection.
      - name: Build snapshot of corpus state
        if: success()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p versions
          # Snapshot: aktuelle Aggregate aus dem Validation-Report
          if [ -f client/public/resonanzen-validation-report.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('client/public/resonanzen-validation-report.json', 'utf-8'));
              const snap = {
                date: '$DATE',
                generatedAt: new Date().toISOString(),
                commit: '${{ github.sha }}',
                filesChecked: r.filesChecked,
                aggregates: r.aggregates,
                errors: r.errors,
                warnings: r.warnings,
              };
              fs.writeFileSync('versions/snapshot-$DATE.json', JSON.stringify(snap, null, 2));
              console.log('Snapshot:', snap);
            "
          fi

      # ─── Index-Rebuild: das eigentliche Inkrafttreten ──────────────────
      # Sobald validate erfolgreich war, generieren wir client/public/
      # resonanzen-index.json neu — sonst landen frische AI-Antworten zwar
      # als Markdown in raw/, aber die FAQ-Ansicht sieht sie erst beim
      # nächsten manuellen Build. Mit diesem Schritt schließt sich der
      # Loop: API-PUT → validate → rebuild-index → commit → static deploy.
      #
      # Embeddings werden nur generiert, wenn GEMINI_API_KEY als Secret
      # vorliegt; ohne fällt der Index auf Lexical-Search zurück (ohne
      # related-Cross-Links, aber funktional vollständig).
      - name: Rebuild resonanzen-index.json
        if: success()
        run: pnpm tsx scripts/build-resonanzen-index.ts
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME:  ${{ github.event.repository.name }}
          GITHUB_REPO_BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit snapshot + index + tag last-stable
        if: success()
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "corpus-guardian-bot"
          git config user.email "noreply@github.com"
          # Snapshot + neu gebauten Index gemeinsam stagen
          git add versions/ client/public/resonanzen-index.json client/public/resonanzen-embeddings.json client/public/resonanzen-holdout-baseline.json client/public/resonanzen-holdout-report.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No snapshot/index changes to commit"
          else
            git commit -m "snapshot: corpus state + index $DATE [skip ci]"
            # Race-Schutz: wenn main inzwischen gewachsen ist, rebase
            # vor dem Push, damit der Snapshot nicht in einer Push-Race
            # verloren geht.
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "push attempt $i fehlgeschlagen, retry …"
              sleep $((2 * i))
            done
          fi
          # Tag last-stable überschreiben (force, damit immer auf neuestem stable steht)
          git tag -f last-stable-$DATE
          git tag -f last-stable
          git push origin --tags --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Drift-Detection: vergleicht aktuellen mit vorigem Snapshot ────
      # Bei Alarmen → Issue mit Label 'corpus-drift'.
      - name: Run drift check
        if: success()
        id: drift
        run: |
          set +e
          pnpm tsx scripts/check-corpus-drift.ts > drift-output.txt 2>&1
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          cat drift-output.txt
          exit 0  # niemals fail — Drift ist Warning, kein Action-Fail

      - name: Open issue on drift alarm
        if: success() && steps.drift.outputs.exit_code == '1'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            const fs = require('fs');
            let report = null;
            try {
              report = JSON.parse(fs.readFileSync('client/public/resonanzen-drift-report.json', 'utf-8'));
            } catch (e) {
              core.warning('Drift-Report could not be read: ' + e.message);
              return;
            }
            const alarms = (report.issues || []).filter(i => i.level === 'alarm');
            const warnings = (report.issues || []).filter(i => i.level === 'warning');
            if (alarms.length === 0 && warnings.length === 0) return;
            const sha = context.sha.slice(0, 7);
            const lines = [
              `**Drift-Detection: Korpus-Stand hat sich seit letzter Snapshot bedenklich verändert.**`,
              ``,
              `Commit: ${sha} · Vorherige Snapshot: ${report.previousSnapshot.date} (${report.previousSnapshot.commit?.slice(0,7)}) · Aktuell: ${report.currentSnapshot.date}`,
              `Delta: ${report.delta.files >= 0 ? '+' : ''}${report.delta.files} Files`,
              ``,
              `### Alarme (${alarms.length})`,
              alarms.length > 0
                ? alarms.map(i => `- 🚨 **[${i.rule}]** ${i.detail}`).join('\n')
                : '_keine_',
              ``,
              `### Warnings (${warnings.length})`,
              warnings.length > 0
                ? warnings.map(i => `- ⚠ [${i.rule}] ${i.detail}`).join('\n')
                : '_keine_',
              ``,
              `---`,
              `**Was tun:**`,
              `1. Prüfen ob die Veränderung beabsichtigt war (z.B. bewusstes Löschen alter Einträge)`,
              `2. Bei unbeabsichtigtem Drift: \`git checkout last-stable -- content/resonanzen/\` und committen`,
              `3. Schwellwerte des Drift-Detectors (\`scripts/check-corpus-drift.ts\`) sind anpassbar`,
            ].join('\n');

            // Dedup: bestehendes drift-Issue → Comment, sonst neues Issue
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'corpus-drift',
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Erneuter Drift bei ${sha}:\n\n${lines}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Korpus-Drift] ${alarms.length} Alarm(e) bei commit ${sha}`,
                body: lines,
                labels: ['corpus-drift'],
              });
            }
