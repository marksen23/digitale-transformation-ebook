<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Die Digitale Transformation – Offline</title>
  <style>
    body { margin:0; padding:0; background:#F9F6F0; font-family:'EB Garamond', serif; height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }
    .container { max-width:460px; padding:2rem; }
    svg { width:100%; max-height:220px; margin-bottom:1.8rem; }
    h1 { font-family:'Neue Haas Grotesk Display Pro', sans-serif; font-size:1.85rem; color:#192347; margin-bottom:1.2rem; }
    .quote { font-size:1.4rem; line-height:1.45; margin:1.8rem 0 2rem; font-style:italic; color:#192347; border-left:3px solid #0A3D62; padding-left:1.4rem; text-align:left; }
    p { font-size:1.05rem; line-height:1.75; color:#555; margin-bottom:2.2rem; }
    button { background:#0A3D62; color:white; border:none; padding:14px 36px; font-size:1.05rem; border-radius:4px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 420 240" xmlns="http://www.w3.org/2000/svg" fill="none">
      <path d="M80 120 Q60 100 45 125 Q40 160 65 175 Q85 165 95 140" stroke="#2C2C2C" stroke-width="6" stroke-linecap="round"/>
      <path d="M95 140 Q110 155 125 145" stroke="#2C2C2C" stroke-width="6" stroke-linecap="round"/>
      <path d="M320 120 Q340 100 355 125 Q360 160 335 175 Q315 165 305 140" stroke="#0A3D62" stroke-width="6" stroke-linecap="round"/>
      <path d="M305 140 Q290 155 275 145" stroke="#0A3D62" stroke-width="6" stroke-linecap="round"/>
      <line x1="125" y1="145" x2="275" y2="145" stroke="#0A3D62" stroke-width="2" stroke-dasharray="4 3" opacity="0.4"/>
    </svg>
    <h1>Die Digitale Transformation</h1>
    <div class="quote">Nicht alles, was möglich ist, ist wirklich.</div>
    <p>Die Resonanz braucht eine Verbindung.<br>Im Moment bist du offline – doch die Frage bleibt.</p>
    <button onclick="location.reload()">Noch einmal versuchen</button>
  </div>
</body>
</html>
