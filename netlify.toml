[build]
  # NUR Frontend bauen. Der Korpus + alle Embeddings + das PDF werden bereits
  # von der GitHub-Action (validate-corpus.yml) gebaut und als JSONs nach
  # client/public/ committet — vite kopiert sie nach dist/public. Netlify muss
  # das NICHT erneut rechnen. Vorher lief hier das volle `pnpm build`
  # (Gemini-Calls + Korpus-Fetch + PDF-Gen) bei JEDEM Deploy → ~100s+ und
  # Gemini-Quota-Verbrauch. Jetzt: ~40s reiner vite-Build, null Gemini-Calls.
  command = "pnpm install && pnpm build:frontend"
  publish = "dist/public"
  functions = "dist/functions"
  # Build-Ignore: überspringt den Deploy, wenn ein Commit nichts
  # Frontend-Relevantes ändert (nur server/, scripts/, content/, *.md).
  # Spart Build-Minuten bei reinen Backend-/Korpus-Raw-/Doku-Commits.
  ignore = "bash scripts/netlify-ignore.sh"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10.4.1"

# Proxy /api/* requests to the Render backend (Express + Gemini)
# Replace the URL with your actual Render service URL.
[[redirects]]
  from = "/api/*"
  to = "https://digitale-transformation-ebook.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must come AFTER the /api rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "pnpm dev"
  port = 3000
  framework = "vite"
