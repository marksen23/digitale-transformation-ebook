# ⚠️ NETLIFY = NUR NOCH 301-FORWARDER (seit 2026-07-03; abgelöst 2026-06-23).
# Die App läuft Render-only (Express serviert Frontend + API + Live-Korpus-JSONs).
# Diese Site existiert nur noch, damit Alt-Besucher der netlify.app-URL zum
# Service weitergeleitet werden. Build = Sekunden-Stub (kein vite, KEINE
# Gemini-Calls, keine nennenswerten Build-Minuten).
#
# Ziel ist bewusst onrender.com: sobald auf Render CANONICAL_REDIRECT=1 aktiv
# ist (nach dem DNS-Flip), verlängert sich die Kette automatisch auf
# netlify.app → onrender.com → digitale-transformation-ebook.de — hier muss
# dann NICHTS mehr geändert werden.
[build]
  command = "mkdir -p _stub && echo '<!doctype html><meta http-equiv=\"refresh\" content=\"0;url=https://digitale-transformation-ebook.onrender.com/\">' > _stub/index.html"
  publish = "_stub"

[[redirects]]
  from = "/*"
  to = "https://digitale-transformation-ebook.onrender.com/:splat"
  status = 301
  force = true
