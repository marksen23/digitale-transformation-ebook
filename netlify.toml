[build]
  command = "pnpm install && pnpm build"
  publish = "dist/public"
  functions = "dist/functions"

[build.environment]
  NODE_VERSION = "22.13.0"
  PNPM_VERSION = "10.4.1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "pnpm dev"
  port = 3000
  framework = "vite"
