services:
  - type: web
    name: digitale-transformation-ebook
    runtime: node
    # Render baut nur den Server-Bundle. Index + Embeddings sind im CI-
    # Workflow validate-corpus.yml gebaut und nach client/public/ committed —
    # Render braucht sie nicht neu zu generieren (wäre nur Verschwendung von
    # Gemini-Quota und timed out auf Free-Tier-Build, Run 2026-05-23 07:31).
    # Frontend baut Netlify.
    buildCommand: npm install --legacy-peer-deps && npm run build:server
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.13.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # GITHUB_TOKEN — Pflicht für Live-Append. Ohne dieses Token kann der
      # Server keine neuen KI-Antworten in content/resonanzen/raw/ und in
      # client/public/resonanzen-index.json schreiben → KI-Ausgaben werden
      # nicht in den Korpus übernommen. Personal Access Token mit "repo"-
      # Scope erstellen unter https://github.com/settings/tokens und im
      # Render-Dashboard manuell hinterlegen (sync: false).
      - key: GITHUB_TOKEN
        sync: false
