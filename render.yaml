services:
  - type: web
    name: digitale-transformation-ebook
    runtime: node
    # Render-only (Netlify abgelöst 2026-06-23): Render baut Frontend + Server
    # und serviert beide (express.static + SPA-Fallback). NICHT `npm run build`
    # — das würde Korpus-Index/Embeddings/PDF mit Gemini-Calls neu rechnen (macht
    # CI). Nur build:frontend (vite, kopiert committete JSONs als Fallback) +
    # build:server.
    buildCommand: npm install --legacy-peer-deps && npm run build:frontend && npm run build:server
    startCommand: node dist/index.js
    # Build-Filter: Render redeployt nur bei Frontend-CODE oder Server. Korpus-
    # DATEN (client/public/*.json) triggern KEINEN Redeploy — der Server zieht
    # sie live von GitHub-Raw (server/lib/rawAssets.ts + werkRetrieval.ts, TTL-
    # Cache). Spart Build-Minuten + verhindert Deploy-Churn bei jedem Daten-Commit.
    buildFilters:
      paths:
        - server/**
        - client/src/**
        - client/index.html
        - package.json
        - package-lock.json
        - pnpm-lock.yaml
        - tsconfig.json
        - vite.config.ts
        - render.yaml
      ignoredPaths:
        - client/public/**
        - content/**
        - scripts/**
        - "**/*.md"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.13.0
      # Kanonische Produktiv-Domain — EINZIGE Quelle für canonical/og/sitemap/
      # JSON-LD (server/lib/seo.ts) und für die Client-Links (vite-Build liest
      # VITE_SITE_URL → client/src/lib/siteUrl.ts). Beide defaulten ohnehin auf
      # diese Domain; hier explizit dokumentiert. Für Staging/Preview umsetzbar.
      - key: SITE_URL
        value: https://digitale-transformation-ebook.de
      - key: VITE_SITE_URL
        value: https://digitale-transformation-ebook.de
      # LAUNCH-SCHALTER: erst NACH dem DNS-Flip auf "1" setzen. Dann leiten
      # *.onrender.com / *.netlify.app per 301 auf die de-Domain um (bündelt
      # SEO-Signale). Vorher AUS lassen — sonst leitet onrender auf eine noch
      # nicht live geschaltete Domain um. Default (nicht gesetzt) = inert.
      - key: CANONICAL_REDIRECT
        value: "0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Multi-Key-Failover (M5): optionaler zweiter Embedding-Key auf einem
      # anderen GCP-Projekt mit eigenem Billing. Wird vom shared
      # embeddingClient automatisch eingewechselt, wenn der Primärkey
      # billing/auth-blockiert ist (403 dunning). Selbes Modell →
      # vektorkompatibel. Leer lassen, wenn kein Fallback existiert.
      - key: GEMINI_API_KEY_FALLBACK
        sync: false
      # GITHUB_TOKEN — Pflicht für Live-Append. Ohne dieses Token kann der
      # Server keine neuen KI-Antworten in content/resonanzen/raw/ und in
      # client/public/resonanzen-index.json schreiben → KI-Ausgaben werden
      # nicht in den Korpus übernommen. Personal Access Token mit "repo"-
      # Scope erstellen unter https://github.com/settings/tokens und im
      # Render-Dashboard manuell hinterlegen (sync: false).
      - key: GITHUB_TOKEN
        sync: false
