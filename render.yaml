services:
  - type: web
    name: digitale-transformation-ebook
    runtime: node
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.13.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
